<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebView Upload + GPay Redirect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input[type="file"] {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      width: 100%;
    }

    .upload-btn {
      background-color: #4CAF50;
      color: white;
    }

    .gpay-btn {
      background-color: #4285F4;
      color: white;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload File</h2>

    <input type="file" id="fileInput" />
    <button class="upload-btn" onclick="uploadFile()">Upload</button>

    <button class="gpay-btn" onclick="openGPay()">Pay with Google Pay</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      const status = document.getElementById('status');

      if (!fileInput.files.length) {
        status.innerText = 'Please select a file first.';
        return;
      }

      const file = fileInput.files[0];
      status.innerText = 'Uploading: ' + file.name;

      // Mock upload (replace with real API)
      setTimeout(() => {
        status.innerText = 'Upload successful: ' + file.name;
      }, 1500);
    }

    function openGPay() {
      // UPI deep link for Google Pay
      const upiUrl = "upi://pay?pa=test@upi&pn=Test%20User&mc=0000&tid=123456&tr=123456&tn=Test%20Payment&am=10&cu=INR";

      // Try to open native app
      window.location.href = upiUrl;

      // Fallback (optional)
      setTimeout(() => {
        document.getElementById('status').innerText = "If Google Pay didn't open, please check if it's installed.";
      }, 2000);
    }
  </script>
</body>
</html>
